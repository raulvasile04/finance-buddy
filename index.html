<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Buddy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Caveat:wght@400..700&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Sekuya&display=swap" rel="stylesheet">
</head>
<body>
    <div class = "header">
      <h1>Welcome to Finance Buddy</h1>
        
      <h2>I will help you manage all your finances</h2>
    </div>
    <div class = "container">
        <div class = "summary">
            <div class = "balance">
                <label for = "starting-balance">Starting Balance</label>
                <p id = "starting-balance-amount"> </p>
                <input type = "number" id = "starting-balance" placeholder = "Starting Balance">
                <button type = "button" id = "starting-balance-button"> Add Starting Balance :  </button>
            </div>
            <div class = "income">
                <h3 id = "income-title">Income</h3>
                <p id = "income-amount"></p>
            </div>
            <div class = "expenses">
                <h3 id = "expenses-title">Expenses</h3>
                <p id = "expense-amount"></p>
            </div>
        </div>
        <div class = "transactions">
            <div class = "transaction-fields">
                <h3 id = "transactions-title">Transactions</h3>
                <label for = "transaction-description">Description</label>
                <input type = "text" id = "transaction-description" placeholder = "Transaction Description">
                <label for = "transaction-type">Transaction Type</label>
                <select id = "transaction-type"><option value = "income" id = "income">Income</option><option value = "expense" id = "expense">Expense</option>
                </select>
                <label for = "transaction-amount">Amount</label>
                <input type = "number" id = "transaction-amount" placeholder = "Transaction Amount">
                <label for = "transaction-date">Date</label>
                <input type = "date" id = "transaction-date" placeholder = "Transaction Date">
                <button id = "add-transaction">Add Transaction</button>
            </div>
        </div>
        <div class = "transaction-lists">
            <div class = "transaction-list">
                <h3 id = "transactions-list-title">Transaction list</h3>
                    <ul id = "transaction-list">

                    </ul>
            </div>
        </div>
    </div>
    <script src = "index.js"></script>
</body>
</html>
